<div class="admin-auth-page">
  <div class="tech-grid"></div>
  
  <div class="auth-card glass">
    <div class="scanner-line"></div>
    
    <div class="auth-header">
      <div class="admin-badge">MISSION CONTROL</div>
      <h1>PrimeBasket Admin</h1>
      <p>Secure authentication required to access system protocols</p>
    </div>

    <form (ngSubmit)="onLogin()" class="auth-form">
      <div class="input-group">
        <label>ADMIN IDENTIFIER</label>
        <div class="input-wrapper">
          <span class="icon">👤</span>
          <input 
            type="email" 
            [(ngModel)]="loginData.email" 
            name="email" 
            placeholder="admin@primebasket.com" 
            required
            class="admin-input">
        </div>
      </div>

      <div class="input-group">
        <label>ACCESS KEY</label>
        <div class="input-wrapper">
          <span class="icon">🔒</span>
          <input 
            type="password" 
            [(ngModel)]="loginData.password" 
            name="password" 
            placeholder="••••••••" 
            required
            class="admin-input">
        </div>
      </div>

      <div *ngIf="error" class="error-msg">
        <span class="error-icon">⚠️</span> {{ error }}
      </div>

      <button type="submit" class="admin-btn" [disabled]="loading">
        <span *ngIf="!loading">INITIALIZE SYSTEM ACCESS</span>
        <div *ngIf="loading" class="btn-spinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      <p>Restricted access. Unauthorized attempts are logged.</p>
      <a routerLink="/" class="back-link">Return to Storefront</a>
    </div>
  </div>
</div>
