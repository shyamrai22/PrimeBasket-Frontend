<aside class="merchant-sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <div class="brand-box">
      <div class="logo-sq">PB</div>
      <div class="brand-info">
        <span class="brand-name">PrimeMerchant</span>
        <span class="portal-tag">Growth Portal</span>
      </div>
    </div>
    <button class="btn-toggle" (click)="toggleSidebar()" title="Toggle Sidebar">
      {{ isCollapsed ? '→' : '←' }}
    </button>
  </div>

  <nav class="sidebar-nav">
    <a routerLink="/merchant/dashboard" routerLinkActive="active" class="nav-item">
      <span class="icon">📊</span>
      <span class="label">Dashboard</span>
    </a>
    <a routerLink="/merchant/products" routerLinkActive="active" class="nav-item">
      <span class="icon">📦</span>
      <span class="label">My Products</span>
    </a>
    <a routerLink="/merchant/orders" routerLinkActive="active" class="nav-item">
      <span class="icon">🛒</span>
      <span class="label">Orders</span>
    </a>
    <a routerLink="/merchant/earnings" routerLinkActive="active" class="nav-item">
      <span class="icon">💰</span>
      <span class="label">Earnings</span>
    </a>
    
    <div class="nav-divider"></div>
    
    <a routerLink="/merchant/profile" routerLinkActive="active" class="nav-item">
      <span class="icon">⚙️</span>
      <span class="label">Store Settings</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-profile" *ngIf="user && user.email">
      <div class="user-avatar">{{ user.email.slice(0,2) | uppercase }}</div>
      <div class="user-info">
        <span class="user-name">{{ user.email.split('@')[0] }}</span>
        <span class="role-pill">Merchant</span>
      </div>
    </div>
    <button class="btn-logout-small" (click)="onLogout()">
      <span>Logout</span>
    </button>
  </div>
</aside>
