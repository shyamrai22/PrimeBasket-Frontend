<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" *ngIf="product && !loading">
  <div class="bg-white rounded-xl shadow-lg overflow-hidden">
    <div class="md:flex">
      <div class="md:flex-shrink-0 md:w-1/2 p-6 flex justify-center items-center bg-gray-50">
        <img class="h-64 md:h-96 w-full object-contain rounded" [src]="product.imageUrl || 'https://via.placeholder.com/600'" alt="Product Image">
      </div>
      <div class="p-8 md:w-1/2">
        <div class="uppercase tracking-wide text-sm text-indigo-600 font-semibold">{{product.categoryName || 'Product'}}</div>
        <h2 class="mt-2 text-3xl leading-8 font-extrabold tracking-tight text-gray-900 sm:text-4xl">{{product.name}}</h2>
        <p class="mt-4 text-xl text-gray-500 font-bold">₹{{product.price}}</p>
        
        <div class="mt-6">
          <h3 class="sr-only">Description</h3>
          <p class="text-base text-gray-700">{{product.description}}</p>
        </div>

        <div class="mt-8">
          <div class="flex items-center">
            <span class="mr-3 text-gray-700 font-medium">Quantity</span>
            <div class="flex items-center border border-gray-300 rounded">
              <button (click)="quantity = quantity > 1 ? quantity - 1 : 1" class="px-3 py-1 text-gray-600 hover:bg-gray-100 transition">-</button>
              <input type="number" [(ngModel)]="quantity" class="w-12 text-center border-0 focus:ring-0 p-1" min="1">
              <button (click)="quantity = quantity + 1" class="px-3 py-1 text-gray-600 hover:bg-gray-100 transition">+</button>
            </div>
          </div>
        </div>

        <div class="mt-10 flex space-x-4">
          <button (click)="addToCart()" class="flex-1 bg-white border border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-3 px-8 rounded transition duration-200 shadow-sm">
            Add to Cart
          </button>
          <button (click)="buyNow()" class="flex-1 bg-indigo-600 text-white hover:bg-indigo-700 font-bold py-3 px-8 rounded transition duration-200 shadow-md">
            Buy Now
          </button>
        </div>
        
        <div class="mt-4 text-sm text-gray-500 flex items-center justify-center">
          <svg class="w-4 h-4 mr-1 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          In Stock & Ready to Ship
        </div>
      </div>
    </div>
  </div>
</div>

<div *ngIf="loading" class="flex justify-center items-center h-64">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
</div>
